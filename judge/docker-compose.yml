services:
  judge:
    build:
      context: .
      dockerfile: Dockerfile

    image: judge-server:latest
    container_name: judge-server
    restart: unless-stopped

    ports:
      - "127.0.0.1:3000:3000"   # localhost only — never expose publicly

    environment:
      - PORT=3000
      - TIMEOUT_MS=10000
      - POOL_SIZE=1          
      - RECYCLE_AFTER=200
      - MAX_OUTPUT=10000
      - MAX_CODE_LENGTH=65536
      - RATE_LIMIT_WINDOW=60000
      - RATE_LIMIT_MAX=10
      - CORS_ORIGIN=http://localhost:5173

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # NOTE: /tmp host mount removed — sandbox has its own --tmpfs /tmp

    security_opt:
      - no-new-privileges:true